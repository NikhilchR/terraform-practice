name: Maven Java deployment

on:
  push

jobs:
    build_deploy:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: java-version
            uses: actions/setup-java@v4
            with:
                java-version: '17'
                distribution: 'oracle'
                architecture: x64
          - name: Build app
            run: |
             mvn clean install package
             mkdir staging && cp target/*.jar staging
          - uses: actions/upload-artifact@v4
            with:
                name: Package
                path: staging   